name: Automatische Blog Generator

on:
  schedule:
    - cron: '0 7 * * 1'  # Maandag 07:00 UTC
    - cron: '0 7 * * 3'  # Woensdag 07:00 UTC
    - cron: '0 7 * * 5'  # Vrijdag 07:00 UTC
  workflow_dispatch:      # Handmatig starten mogelijk

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate blog article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_blog.py

      - name: Commit and push new blog
        run: |
          git config --global user.name "Blog Bot"
          git config --global user.email "bot@vansassales.nl"
          git add -A
          git diff --staged --quiet || git commit -m "Nieuw blogartikel - $(date +'%Y-%m-%d')"
          git push
